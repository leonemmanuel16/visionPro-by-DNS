services:
  go2rtc:
    build: ./services/go2rtc
    restart: unless-stopped
    network_mode: host
    # NVIDIA GPU for hardware video encoding/decoding (NVENC/NVDEC)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=video,compute,utility
    volumes:
      - ./config/go2rtc.yaml:/config/go2rtc.yaml

  camera-manager:
    build: ./services/camera-manager
    network_mode: host
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - REDIS_URL=redis://localhost:6379
      - POSTGRES_URL=postgresql://vision:${DB_PASSWORD}@localhost:5432/visionai
      - ONVIF_DEFAULT_USER=${ONVIF_DEFAULT_USER:-dns}
      - ONVIF_DEFAULT_PASS=${ONVIF_DEFAULT_PASS:-admin12345}
      - DISCOVERY_INTERVAL=300
      - HEALTH_CHECK_INTERVAL=60
      - GO2RTC_CONFIG_PATH=/config/go2rtc.yaml
    volumes:
      - ./config:/config
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started

  detector:
    build: ./services/detector
    network_mode: host
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # NVIDIA GPU acceleration (requires nvidia-container-toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video]
    environment:
      - REDIS_URL=redis://localhost:6379
      - POSTGRES_URL=postgresql://vision:${DB_PASSWORD}@localhost:5432/visionai
      - MINIO_ENDPOINT=localhost:9000
      - MINIO_ACCESS_KEY=${MINIO_USER}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD}
      - MODEL_NAME=${MODEL_NAME:-yolo11s}
      - DETECTION_FPS=${DETECTION_FPS:-15}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.05}
      - GO2RTC_URL=http://localhost:1984
      - DEVICE=${DEVICE:-auto}
      - RING_BUFFER_SECONDS=${RING_BUFFER_SECONDS:-15}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    volumes:
      - detector-models:/app/models
    depends_on:
      - go2rtc
      - redis
      - postgres
      - minio

  api:
    build: ./services/api
    restart: unless-stopped
    ports:
      - "8000:8000"
    # NVIDIA GPU monitoring (read-only access to nvidia-smi)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [utility]
    environment:
      - POSTGRES_URL=postgresql+asyncpg://vision:${DB_PASSWORD}@postgres:5432/visionai
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_MINUTES=60
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-DNS Vision Pro}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - DDNS_CONFIG_PATH=/config/ddns.json
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
      - HEALTH_ALERT_CPU_THRESHOLD=${HEALTH_ALERT_CPU_THRESHOLD:-90}
      - HEALTH_ALERT_RAM_THRESHOLD=${HEALTH_ALERT_RAM_THRESHOLD:-90}
      - HEALTH_ALERT_GPU_THRESHOLD=${HEALTH_ALERT_GPU_THRESHOLD:-95}
      - HEALTH_ALERT_GPU_TEMP_THRESHOLD=${HEALTH_ALERT_GPU_TEMP_THRESHOLD:-85}
      - HEALTH_ALERT_DISK_THRESHOLD=${HEALTH_ALERT_DISK_THRESHOLD:-90}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/config
    depends_on:
      - postgres
      - redis
      - minio

  dashboard:
    build: ./services/dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - NEXT_PUBLIC_GO2RTC_URL=${NEXT_PUBLIC_GO2RTC_URL:-}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-}
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=visionai
      - POSTGRES_USER=vision
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./data/db:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
      - ./data/clips:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  detector-models:
