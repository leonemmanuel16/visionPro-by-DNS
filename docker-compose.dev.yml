version: '3.8'

# Development overrides - use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  detector:
    # In development without GPU, use CPU-only mode
    deploy:
      resources: {}
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://vision:${DB_PASSWORD}@postgres:5432/visionai
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD}
      - MODEL_NAME=${MODEL_NAME:-yolov10n}
      - DETECTION_FPS=${DETECTION_FPS:-2}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.5}
      - GO2RTC_URL=http://host.docker.internal:1984
      - DEVICE=cpu

  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./services/dashboard/src:/app/src
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_GO2RTC_URL=http://localhost:1984
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws

  api:
    volumes:
      - ./services/api:/app
    environment:
      - POSTGRES_URL=postgresql://vision:${DB_PASSWORD}@postgres:5432/visionai
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_MINUTES=60
      - DEBUG=true
